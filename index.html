<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Display</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: sans-serif;
  }

  /* ── Slideshow container ── */
  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Track: semua slide berjajar horizontal ── */
  #track {
    display: flex;
    width: 100%;
    height: 100%;
    /* akan di-transform via JS */
    transition: transform 0.75s cubic-bezier(0.77, 0, 0.18, 1);
  }

  /* ── Tiap slide ── */
  .slide {
    flex: 0 0 100vw;
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* gambar penuh tanpa crop, cocok untuk foto menu */
    object-position: center center;
    display: block;
    background: #000;
  }

  /* ── Progress bar bawah ── */
  #progress-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.6);
    /* reset setiap slide; animasi via JS requestAnimationFrame */
  }

  /* ── Dot indicators ── */
  #dots {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: all 0.35s ease;
  }

  .dot.active {
    background: rgba(255,255,255,0.85);
    width: 22px;
    border-radius: 4px;
  }

  /* ── Slide counter (pojok kanan atas) ── */
  #counter {
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.3);
    z-index: 100;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="slideshow">
  <div id="track"></div>
</div>

<div id="progress-wrap">
  <div id="progress-bar"></div>
</div>

<div id="dots"></div>
<div id="counter"></div>

<script>
(function () {

  /* ── Konfigurasi ─────────────────────────────── */
  const TOTAL        = 12;          // jumlah gambar
  const EXT          = 'png';       // ekstensi file
  const DURATION_MS  = 6000;        // durasi per slide (ms)
  /* ─────────────────────────────────────────────── */

  const images = Array.from({ length: TOTAL }, (_, i) => {
    return `${i + 1}.${EXT}`;      // 1.png, 2.png, ... 12.png
  });

  const track     = document.getElementById('track');
  const dotsWrap  = document.getElementById('dots');
  const bar       = document.getElementById('progress-bar');
  const counter   = document.getElementById('counter');

  let current   = 0;
  let startTime = null;
  let rafId     = null;

  /* ── Buat slide elements ── */
  images.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    const img = document.createElement('img');
    img.src = src;
    img.alt = `Menu ${i + 1}`;
    img.draggable = false;
    slide.appendChild(img);
    track.appendChild(slide);
  });

  /* ── Set lebar track ── */
  track.style.width = `${images.length * 100}vw`;

  /* ── Buat dot indicators ── */
  images.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsWrap.appendChild(d);
  });

  function getDots() {
    return dotsWrap.querySelectorAll('.dot');
  }

  /* ── Pindah ke slide tertentu ── */
  function goTo(index) {
    const dots = getDots();
    dots[current].classList.remove('active');
    current = index;
    dots[current].classList.add('active');

    track.style.transform = `translateX(-${current * (100 / images.length * 100)}%)`;
    // lebih simpel: langsung pakai px
    track.style.transform = `translateX(-${current * 100}vw)`;

    counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(images.length).padStart(2, '0')}`;

    /* reset progress bar */
    bar.style.transition = 'none';
    bar.style.width = '0%';

    startTime = null;
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(animate);
  }

  /* ── Animasi progress bar ── */
  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const pct = Math.min((elapsed / DURATION_MS) * 100, 100);

    bar.style.width = pct + '%';

    if (elapsed >= DURATION_MS) {
      goTo((current + 1) % images.length);
    } else {
      rafId = requestAnimationFrame(animate);
    }
  }

  /* ── Keyboard navigation (opsional, untuk testing) ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      cancelAnimationFrame(rafId);
      goTo((current + 1) % images.length);
    } else if (e.key === 'ArrowLeft') {
      cancelAnimationFrame(rafId);
      goTo((current - 1 + images.length) % images.length);
    } else if (e.key === 'f' || e.key === 'F') {
      /* F = toggle fullscreen */
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  });

  /* ── Mulai ── */
  goTo(0);

})();
</script>
</body>
</html>
